name: Sync Fork

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Add upstream
        run: git remote add upstream https://github.com/windrider-6/ServerS4A12.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream/main into main
        run: |
          git checkout main
          git merge upstream/main --allow-unrelated-histories -m "Auto-sync from upstream"
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/Attder/ServerS4A12.git main