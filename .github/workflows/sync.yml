name: Sync Fork (Auto)

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Add upstream
        run: git remote add upstream https://github.com/windrider-6/ServerS4A12.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge and push (auto)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge upstream/main --allow-unrelated-histories -m "🔄 Auto-sync from upstream" || echo "已是最新"
          git push origin main || git push --force origin main
